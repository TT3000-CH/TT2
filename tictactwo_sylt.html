<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#9ed7f3" />
  <title>TicTacTwo – Seehund gegen Möwe</title>
  <style>
    :root {
      --ink: #17313d;
      --panel: rgba(255,255,255,.82);
      --panel-border: rgba(255,255,255,.72);
      --shadow: 0 20px 60px rgba(12, 45, 58, .18);
      --accent: #ff7c52;
      --cell: rgba(255,255,255,.78);
      --cell-hover: rgba(255,255,255,.95);
      --line: rgba(23,49,61,.18);
      --sky-top: #8fd2f3;
      --sky-bottom: #f7dfb7;
      --ground-a: #e8c988;
      --ground-b: #d8b46b;
      --ground-pattern: rgba(255,255,255,.16);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      background: linear-gradient(var(--sky-top), var(--sky-bottom));
      transition: background .5s ease;
    }

    body[data-theme="duene"] {
      --sky-top: #79c8ef;
      --sky-bottom: #f9e3b7;
      --ground-a: #edd28f;
      --ground-b: #cfa961;
      --ground-pattern: rgba(255,255,255,.22);
      --accent: #f2764b;
    }
    body[data-theme="gras"] {
      --sky-top: #77c9f2;
      --sky-bottom: #dff0c1;
      --ground-a: #7fbf67;
      --ground-b: #3f8652;
      --ground-pattern: rgba(235,255,210,.19);
      --accent: #ef8354;
    }
    body[data-theme="watt"] {
      --sky-top: #9bc8de;
      --sky-bottom: #f0d3ad;
      --ground-a: #a98768;
      --ground-b: #6e665e;
      --ground-pattern: rgba(220,245,245,.17);
      --accent: #e96d56;
    }

    .world {
      position: fixed;
      inset: 0;
      z-index: -5;
      overflow: hidden;
      background: linear-gradient(var(--sky-top) 0 52%, var(--ground-a) 52% 72%, var(--ground-b) 100%);
      transition: background .5s ease;
    }
    .sun {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      right: 8vw;
      top: 7vh;
      background: radial-gradient(circle at 35% 35%, #fffbe8 0 12%, #ffd96d 45%, rgba(255,217,109,.15) 70%);
      box-shadow: 0 0 70px rgba(255, 229, 137, .65);
      opacity: .9;
    }
    .cloud { position: absolute; width: 130px; height: 38px; border-radius: 99px; background: rgba(255,255,255,.68); filter: blur(.2px); animation: drift 22s linear infinite; }
    .cloud::before, .cloud::after { content:""; position:absolute; border-radius:50%; background:inherit; }
    .cloud::before { width:55px; height:55px; left:25px; bottom:5px; }
    .cloud::after { width:70px; height:70px; right:20px; bottom:0; }
    .cloud.c1 { top: 14%; left: -160px; }
    .cloud.c2 { top: 29%; left: -240px; transform: scale(.7); animation-delay: -9s; opacity:.65; }
    @keyframes drift { to { transform: translateX(calc(100vw + 400px)); } }

    .ground-shape { position:absolute; left:-5%; width:110%; transition:.5s ease; }
    .ground-shape.one { bottom: 20%; height: 26%; border-radius: 50% 55% 0 0 / 65% 75% 0 0; background: var(--ground-a); transform: rotate(-1deg); }
    .ground-shape.two { bottom: -2%; height: 30%; border-radius: 54% 46% 0 0 / 30% 38% 0 0; background: var(--ground-b); }
    .texture { position:absolute; inset:52% 0 0; opacity:.9; background-image: repeating-radial-gradient(ellipse at 10% 20%, transparent 0 10px, var(--ground-pattern) 11px 12px, transparent 13px 28px); }

    body[data-theme="watt"] .world::after {
      content:""; position:absolute; left:-10%; bottom:20%; width:120%; height:18%; opacity:.55;
      background: repeating-linear-gradient(165deg, transparent 0 20px, rgba(215,239,239,.45) 21px 24px, transparent 25px 45px);
    }
    body[data-theme="gras"] .texture {
      background-image: repeating-linear-gradient(82deg, transparent 0 14px, rgba(230,255,205,.18) 15px 17px, transparent 18px 30px);
    }

    .shell {
      width: min(100%, 780px);
      min-height: 100vh;
      margin: auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .title-card, .game-card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
    }
    .title-card { border-radius: 26px; padding: 18px 20px 16px; text-align:center; }
    h1 { margin:0; font-size: clamp(2rem, 8vw, 3.7rem); line-height:.95; letter-spacing:-.06em; }
    .sub { margin:8px 0 0; font-size: .95rem; opacity:.72; font-weight:700; }

    .theme-picker { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:14px; }
    .theme-btn, .action-btn {
      border:0; cursor:pointer; font:inherit; color:var(--ink); font-weight:850;
      border-radius:999px; padding:10px 14px; background:rgba(255,255,255,.68);
      box-shadow: inset 0 0 0 1px rgba(23,49,61,.1), 0 6px 16px rgba(23,49,61,.08);
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .theme-btn:hover, .action-btn:hover { transform:translateY(-2px); background:#fff; }
    .theme-btn.active { background:var(--ink); color:white; box-shadow:0 8px 22px rgba(23,49,61,.24); }

    .game-card { border-radius:30px; padding:18px; }
    .players { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; }
    .player {
      display:flex; align-items:center; gap:10px; min-width:0; padding:9px 12px;
      border-radius:18px; background:rgba(255,255,255,.52); opacity:.58; transform:scale(.97);
      transition:.25s ease;
    }
    .player:last-child { flex-direction:row-reverse; text-align:right; }
    .player.active { opacity:1; transform:scale(1); box-shadow:inset 0 0 0 2px var(--accent), 0 8px 20px rgba(23,49,61,.1); }
    .avatar { width:52px; height:52px; flex:0 0 52px; filter:drop-shadow(0 5px 5px rgba(0,0,0,.12)); }
    .player-name { font-weight:950; font-size:clamp(.84rem, 3vw, 1rem); line-height:1.05; }
    .player-role { display:block; font-size:.73rem; opacity:.62; margin-top:3px; }
    .vs { font-weight:1000; opacity:.35; font-size:.85rem; }

    .status { min-height:48px; display:flex; align-items:center; justify-content:center; text-align:center; font-weight:950; font-size:clamp(1rem,4vw,1.25rem); padding:10px 4px 8px; }

    .board-wrap { position:relative; width:min(100%, 470px); margin:auto; }
    .board {
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
      width:100%; aspect-ratio:1; padding:10px; border-radius:28px;
      background:rgba(23,49,61,.12); box-shadow:inset 0 0 0 1px rgba(255,255,255,.45);
    }
    .cell {
      appearance:none; border:0; border-radius:21px; background:var(--cell); cursor:pointer;
      display:grid; place-items:center; padding:10%; box-shadow:0 7px 18px rgba(23,49,61,.11), inset 0 0 0 1px rgba(255,255,255,.64);
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:hover:not(:disabled) { transform:translateY(-3px) scale(1.015); background:var(--cell-hover); }
    .cell:active:not(:disabled) { transform:scale(.95); }
    .cell:disabled { cursor:default; }
    .cell svg { width:90%; height:90%; filter:drop-shadow(0 6px 6px rgba(0,0,0,.16)); animation:pop .34s cubic-bezier(.2,1.6,.45,1); }
    @keyframes pop { from { transform:scale(.15) rotate(-20deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }
    .cell.win { animation:winnerCell .7s ease-in-out infinite alternate; background:#fff8cf; box-shadow:0 0 0 3px #ffd64d, 0 0 32px rgba(255,214,77,.75); }
    @keyframes winnerCell { to { transform:translateY(-4px) rotate(1.5deg); } }

    .controls { display:flex; justify-content:center; gap:10px; margin-top:14px; }
    .action-btn.primary { background:var(--ink); color:white; padding-inline:20px; }

    .overlay {
      position:fixed; inset:0; z-index:20; display:none; place-items:center; padding:20px;
      background:rgba(7,28,38,.48); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    .overlay.show { display:grid; animation:fadeIn .28s ease; }
    @keyframes fadeIn { from{opacity:0} }
    .celebration {
      width:min(94vw, 560px); min-height:510px; border-radius:34px; background:rgba(255,255,255,.94);
      box-shadow:0 28px 90px rgba(0,0,0,.32); position:relative; overflow:hidden; text-align:center; padding:28px 22px 22px;
    }
    .celebration h2 { margin:0; font-size:clamp(2rem,9vw,3.4rem); letter-spacing:-.05em; }
    .celebration p { margin:8px 0 0; font-weight:800; opacity:.65; }
    .stage { position:relative; height:310px; margin-top:12px; border-radius:24px; overflow:hidden; background:linear-gradient(#253a69 0 50%, #171322 50%); }
    .stage::before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 20% 15%, #ffec85 0 3%, transparent 20%), radial-gradient(circle at 80% 8%, #7cf7ff 0 3%, transparent 21%), radial-gradient(circle at 50% 0%, #ff7ac3 0 3%, transparent 20%); animation:lights 1s linear infinite alternate; }
    @keyframes lights { to { filter:hue-rotate(80deg); opacity:.72; } }

    .dancing-seal { position:absolute; width:170px; height:170px; left:50%; top:52%; transform:translate(-50%,-50%); animation:dance .48s ease-in-out infinite alternate; filter:drop-shadow(0 16px 9px rgba(0,0,0,.38)); }
    @keyframes dance { from { transform:translate(-50%,-50%) rotate(-14deg) translateY(7px); } to { transform:translate(-50%,-50%) rotate(14deg) translateY(-10px) scale(1.05); } }
    .disco { position:absolute; width:68px; height:68px; left:50%; top:20px; transform:translateX(-50%); border-radius:50%; background:conic-gradient(#ff5a7a,#ffd84a,#65e6ff,#a979ff,#ff5a7a); box-shadow:0 0 35px rgba(255,255,255,.8); animation:spin 1.8s linear infinite; }
    @keyframes spin { to { transform:translateX(-50%) rotate(360deg); } }
    .music-note { position:absolute; font-size:36px; color:white; animation:note 1.4s ease-out infinite; }
    .music-note.n1 { left:12%; top:64%; }
    .music-note.n2 { right:13%; top:44%; animation-delay:-.6s; }
    @keyframes note { from{transform:translateY(20px) rotate(-10deg); opacity:0} 40%{opacity:1} to{transform:translateY(-100px) rotate(16deg); opacity:0} }

    .rocket-sky { background:linear-gradient(#13285a 0%, #486fa2 58%, #c4d5df 59%, #6d6257 100%); }
    .rocket-gull { position:absolute; width:175px; height:175px; left:12%; top:56%; animation:launch 2.7s cubic-bezier(.1,.7,.2,1) infinite; filter:drop-shadow(0 12px 8px rgba(0,0,0,.35)); }
    @keyframes launch { 0%{transform:translate(-80px,90px) rotate(-12deg) scale(.75)} 35%{transform:translate(100px,-30px) rotate(8deg) scale(1)} 100%{transform:translate(430px,-290px) rotate(20deg) scale(.5)} }
    .flame { position:absolute; width:35px; height:105px; left:40%; top:65%; border-radius:50% 50% 65% 65%; background:linear-gradient(#fff77d,#ff9c35,#f2453d,transparent); filter:blur(1px); transform:rotate(28deg); animation:flame .13s infinite alternate; }
    @keyframes flame { to { height:135px; width:42px; filter:blur(3px); } }
    .star { position:absolute; width:5px; height:5px; border-radius:50%; background:white; box-shadow:0 0 10px white; animation:twinkle 1s infinite alternate; }
    @keyframes twinkle { to{opacity:.25; transform:scale(.5)} }

    #confetti { position:fixed; inset:0; z-index:30; pointer-events:none; display:none; }
    #confetti.show { display:block; }

    .footer { font-size:.73rem; font-weight:750; opacity:.65; text-align:center; text-shadow:0 1px 1px rgba(255,255,255,.7); }

    @media (max-width:520px) {
      .shell { justify-content:flex-start; padding-top:max(12px, env(safe-area-inset-top)); gap:10px; }
      .title-card { padding:14px 12px 12px; border-radius:22px; }
      .game-card { padding:12px; border-radius:24px; }
      .theme-picker { margin-top:10px; gap:6px; }
      .theme-btn { padding:8px 11px; font-size:.82rem; }
      .player { padding:7px; gap:6px; border-radius:14px; }
      .avatar { width:42px; height:42px; flex-basis:42px; }
      .player-role { display:none; }
      .board { gap:7px; padding:7px; border-radius:22px; }
      .cell { border-radius:16px; }
      .status { min-height:40px; padding:7px 2px; }
      .celebration { min-height:470px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:.01ms !important; animation-iteration-count:1 !important; scroll-behavior:auto !important; }
    }
  </style>
</head>
<body data-theme="duene">
  <div class="world" aria-hidden="true">
    <div class="sun"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="ground-shape one"></div><div class="ground-shape two"></div><div class="texture"></div>
  </div>

  <main class="shell">
    <section class="title-card">
      <h1>TicTacTwo</h1>
      <p class="sub">Seehund gegen Möwe – das Küstenduell</p>
      <div class="theme-picker" aria-label="Landschaft auswählen">
        <button class="theme-btn active" data-theme="duene">Düne</button>
        <button class="theme-btn" data-theme="gras">Gras</button>
        <button class="theme-btn" data-theme="watt">Wattenmeer</button>
      </div>
    </section>

    <section class="game-card">
      <div class="players">
        <div class="player active" id="player-seal">
          <div class="avatar" data-icon="seal"></div>
          <div><span class="player-name">Seehund</span><span class="player-role">Spieler 1</span></div>
        </div>
        <div class="vs">VS</div>
        <div class="player" id="player-gull">
          <div class="avatar" data-icon="gull"></div>
          <div><span class="player-name">Möwe</span><span class="player-role">Spieler 2</span></div>
        </div>
      </div>

      <div class="status" id="status" aria-live="polite">Seehund beginnt</div>
      <div class="board-wrap">
        <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe Spielfeld"></div>
      </div>
      <div class="controls">
        <button class="action-btn primary" id="restart">Neue Runde</button>
      </div>
    </section>
    <div class="footer">Eine Reihe aus drei Köpfen gewinnt.</div>
  </main>

  <canvas id="confetti"></canvas>
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="winner-title">
    <div class="celebration">
      <h2 id="winner-title">Gewonnen!</h2>
      <p id="winner-copy"></p>
      <div class="stage" id="stage"></div>
      <div class="controls"><button class="action-btn primary" id="play-again">Noch einmal</button></div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const icons = {
    seal: `<svg viewBox="0 0 120 120" aria-label="Seehundkopf" role="img">
      <defs><linearGradient id="sealG" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#a9b4bb"/><stop offset="1" stop-color="#65737b"/></linearGradient></defs>
      <path d="M19 61c0-28 16-46 41-46s41 18 41 46c0 27-18 44-41 44S19 88 19 61Z" fill="url(#sealG)" stroke="#40515a" stroke-width="4"/>
      <path d="M31 33 17 22c-4 20 3 29 15 29M89 33l14-11c4 20-3 29-15 29" fill="#7f8d94" stroke="#40515a" stroke-width="4" stroke-linejoin="round"/>
      <ellipse cx="45" cy="56" rx="6" ry="8" fill="#182a32"/><ellipse cx="75" cy="56" rx="6" ry="8" fill="#182a32"/>
      <circle cx="43" cy="53" r="2" fill="white"/><circle cx="73" cy="53" r="2" fill="white"/>
      <path d="M51 72c4-7 14-7 18 0-2 6-16 6-18 0Z" fill="#293b43"/>
      <path d="M60 78v8M60 84c-6 7-13 6-17 1M60 84c6 7 13 6 17 1" fill="none" stroke="#293b43" stroke-width="3" stroke-linecap="round"/>
      <path d="M47 75 22 69M47 80 18 82M73 75l25-6M73 80l29 2" fill="none" stroke="#eef3f5" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="36" cy="69" rx="5" ry="3" fill="#87949a"/><ellipse cx="84" cy="69" rx="5" ry="3" fill="#87949a"/>
    </svg>`,
    gull: `<svg viewBox="0 0 120 120" aria-label="Möwenkopf" role="img">
      <defs><linearGradient id="gullG" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#dce6eb"/></linearGradient></defs>
      <path d="M15 62c5-29 21-46 48-46 22 0 39 12 43 36 3 20-7 43-31 51-28 9-65-9-60-41Z" fill="url(#gullG)" stroke="#73838b" stroke-width="4"/>
      <path d="M30 38c-7-17-19-22-23-19 3 19 11 28 25 29" fill="#e9f0f3" stroke="#73838b" stroke-width="4" stroke-linejoin="round"/>
      <path d="M78 66c17-4 31 0 39 8-14 12-30 15-48 8Z" fill="#f4a62a" stroke="#b36a1b" stroke-width="4" stroke-linejoin="round"/>
      <ellipse cx="61" cy="52" rx="8" ry="10" fill="#1f3138"/><circle cx="59" cy="49" r="2.5" fill="white"/>
      <path d="M39 82c11 9 25 12 38 8" fill="none" stroke="#9eabb1" stroke-width="3" stroke-linecap="round"/>
      <path d="M34 30c12-8 27-9 40-3" fill="none" stroke="#b7c3c9" stroke-width="4" stroke-linecap="round"/>
    </svg>`
  };

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const overlay = document.getElementById('overlay');
  const stage = document.getElementById('stage');
  const winnerTitle = document.getElementById('winner-title');
  const winnerCopy = document.getElementById('winner-copy');
  const sealPanel = document.getElementById('player-seal');
  const gullPanel = document.getElementById('player-gull');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');

  let board = Array(9).fill(null);
  let current = 'seal';
  let locked = false;
  let confettiFrame = null;

  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  document.querySelectorAll('[data-icon]').forEach(el => el.innerHTML = icons[el.dataset.icon]);

  function buildBoard() {
    boardEl.innerHTML = '';
    for (let i=0; i<9; i++) {
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.setAttribute('role','gridcell');
      cell.setAttribute('aria-label', `Feld ${i+1}`);
      cell.dataset.index = i;
      cell.addEventListener('click', onMove);
      boardEl.appendChild(cell);
    }
  }

  function onMove(event) {
    const i = Number(event.currentTarget.dataset.index);
    if (locked || board[i]) return;
    board[i] = current;
    event.currentTarget.innerHTML = icons[current];
    event.currentTarget.disabled = true;
    event.currentTarget.setAttribute('aria-label', `${current === 'seal' ? 'Seehund' : 'Möwe'} auf Feld ${i+1}`);

    const line = findWin(current);
    if (line) {
      locked = true;
      line.forEach(index => boardEl.children[index].classList.add('win'));
      statusEl.textContent = `${current === 'seal' ? 'Seehund' : 'Möwe'} gewinnt!`;
      setTimeout(() => celebrate(current), 650);
      return;
    }
    if (board.every(Boolean)) {
      locked = true;
      statusEl.textContent = 'Unentschieden – echte Küstenbalance!';
      setTimeout(() => showDraw(), 500);
      return;
    }
    current = current === 'seal' ? 'gull' : 'seal';
    updateTurn();
  }

  function findWin(player) { return wins.find(combo => combo.every(i => board[i] === player)); }

  function updateTurn() {
    const sealTurn = current === 'seal';
    sealPanel.classList.toggle('active', sealTurn);
    gullPanel.classList.toggle('active', !sealTurn);
    statusEl.textContent = `${sealTurn ? 'Seehund' : 'Möwe'} ist am Zug`;
  }

  function resetGame() {
    stopConfetti();
    overlay.classList.remove('show');
    board = Array(9).fill(null);
    current = 'seal';
    locked = false;
    buildBoard();
    updateTurn();
  }

  function celebrate(player) {
    winnerTitle.textContent = `${player === 'seal' ? 'Seehund' : 'Möwe'} gewinnt!`;
    if (player === 'seal') {
      winnerCopy.textContent = 'Die Robben-Party kann beginnen.';
      stage.className = 'stage';
      stage.innerHTML = `<div class="disco"></div><div class="music-note n1">♪</div><div class="music-note n2">♫</div><div class="dancing-seal">${icons.seal}</div>`;
    } else {
      winnerCopy.textContent = 'Raketenstart über dem Wattenmeer.';
      stage.className = 'stage rocket-sky';
      stage.innerHTML = `${Array.from({length:18},(_,i)=>`<i class="star" style="left:${(i*37)%96}%;top:${(i*53)%56}%;animation-delay:-${i/8}s"></i>`).join('')}<div class="flame"></div><div class="rocket-gull">${icons.gull}</div>`;
    }
    overlay.classList.add('show');
    startConfetti();
  }

  function showDraw() {
    winnerTitle.textContent = 'Unentschieden!';
    winnerCopy.textContent = 'Seehund und Möwe teilen sich den Strand.';
    stage.className = 'stage';
    stage.style.background = 'linear-gradient(#7bc8ef 0 55%, #e8ca86 56%)';
    stage.innerHTML = `<div style="position:absolute;width:145px;left:18%;top:30%;">${icons.seal}</div><div style="position:absolute;width:145px;right:16%;top:25%;">${icons.gull}</div>`;
    overlay.classList.add('show');
  }

  function startConfetti() {
    canvas.classList.add('show');
    resizeCanvas();
    const pieces = Array.from({length:130}, () => ({
      x: Math.random()*canvas.width, y: -20-Math.random()*canvas.height*.5,
      w: 5+Math.random()*8, h: 8+Math.random()*12,
      vx: -2+Math.random()*4, vy: 2+Math.random()*5,
      rot: Math.random()*Math.PI, vr: -.12+Math.random()*.24,
      hue: Math.random()*360
    }));
    let frames = 0;
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        if (p.y > canvas.height+30) { p.y=-20; p.x=Math.random()*canvas.width; }
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle = `hsl(${p.hue} 90% 58%)`; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      });
      frames++;
      if (frames < 600) confettiFrame = requestAnimationFrame(draw); else stopConfetti();
    };
    draw();
  }

  function stopConfetti() {
    if (confettiFrame) cancelAnimationFrame(confettiFrame);
    confettiFrame = null; canvas.classList.remove('show'); ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  function resizeCanvas() { canvas.width = innerWidth * devicePixelRatio; canvas.height = innerHeight * devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); canvas.width = innerWidth; canvas.height = innerHeight; }

  document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => {
    document.body.dataset.theme = btn.dataset.theme;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b === btn));
  }));
  document.getElementById('restart').addEventListener('click', resetGame);
  document.getElementById('play-again').addEventListener('click', resetGame);
  window.addEventListener('resize', () => { if (canvas.classList.contains('show')) resizeCanvas(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('show')) resetGame(); });

  buildBoard();
})();
</script>
</body>
</html>
