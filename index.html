<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#68b7df">
<title>TicTacTwo – Küstenduell</title>
<style>
:root{--ink:#12303d;--glass:rgba(255,255,255,.79);--edge:rgba(255,255,255,.72);--accent:#ff7651;--sky1:#69bde7;--sky2:#f7d6a4;--land1:#e8c77f;--land2:#bd914d;--water:#65aeca;--shadow:0 18px 55px rgba(13,42,53,.22)}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;color:var(--ink);overflow-x:hidden;background:#86c9e8;-webkit-tap-highlight-color:transparent}
button,select{font:inherit}.world{position:fixed;inset:0;z-index:-3;overflow:hidden;background:linear-gradient(var(--sky1) 0 56%,var(--sky2) 56% 61%,var(--land1) 61% 78%,var(--land2) 78%);transition:.5s}
body[data-theme=gras]{--sky1:#6bbce4;--sky2:#d9edbf;--land1:#7fb96b;--land2:#3c7850;--water:#65a9c6;--accent:#ef7754}
body[data-theme=watt]{--sky1:#8bbbd1;--sky2:#edd0aa;--land1:#9e846d;--land2:#665f58;--water:#6c9ba5;--accent:#e96f58}
.sun{position:absolute;width:105px;aspect-ratio:1;border-radius:50%;right:7vw;top:6vh;background:radial-gradient(circle at 35% 30%,#fff 0 7%,#fff4b0 24%,#ffd76e 52%,rgba(255,214,105,.08) 71%);box-shadow:0 0 70px #ffe7a4b8}.cloud{position:absolute;width:150px;height:38px;border-radius:99px;background:#ffffffb8;filter:blur(.2px);animation:drift 24s linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:inherit}.cloud:before{width:60px;height:60px;left:25px;bottom:4px}.cloud:after{width:78px;height:78px;right:20px;bottom:0}.c1{top:14%;left:-190px}.c2{top:31%;left:-250px;transform:scale(.68);animation-delay:-11s}.c3{top:23%;left:-320px;transform:scale(.48);animation-delay:-18s}@keyframes drift{to{translate:calc(100vw + 470px)}}
.sea{position:absolute;left:-5%;width:110%;height:18%;bottom:19%;background:linear-gradient(#8bd0e1cc,var(--water));clip-path:polygon(0 22%,8% 15%,18% 26%,29% 14%,42% 25%,54% 12%,67% 23%,81% 14%,100% 27%,100% 100%,0 100%);opacity:0;transition:.5s}body[data-theme=watt] .sea{opacity:.75;height:25%;bottom:15%}.ridge{position:absolute;left:-7%;width:114%;border-radius:50% 50% 0 0}.r1{height:26%;bottom:17%;background:var(--land1);rotate:-1deg}.r2{height:23%;bottom:-3%;background:var(--land2)}
.grass,.reeds{position:absolute;inset:auto 0 0;height:28%;opacity:0;transition:.5s;background-image:repeating-linear-gradient(82deg,transparent 0 18px,rgba(240,255,211,.34) 19px 21px,transparent 22px 33px)}body[data-theme=gras] .grass{opacity:1}.reeds{height:20%;background-image:repeating-linear-gradient(92deg,transparent 0 28px,rgba(51,59,48,.28) 29px 31px,transparent 32px 43px)}body[data-theme=watt] .reeds{opacity:1}
.bird{position:absolute;width:34px;height:13px;border-top:3px solid #263c46;border-radius:50%;animation:birdfly 13s linear infinite}.bird:after{content:"";position:absolute;right:-28px;top:-3px;width:30px;height:13px;border-top:3px solid #263c46;border-radius:50%;transform:rotate(-8deg)}.b1{top:17%;left:-80px}.b2{top:28%;left:-130px;scale:.7;animation-delay:-7s}@keyframes birdfly{to{translate:calc(100vw + 160px) -35px}}
.app{width:min(100%,760px);min-height:100vh;margin:auto;padding:max(12px,env(safe-area-inset-top)) 13px max(18px,env(safe-area-inset-bottom));display:grid;align-content:center;gap:10px}.glass{background:var(--glass);border:1px solid var(--edge);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(1.15);-webkit-backdrop-filter:blur(18px) saturate(1.15)}header{border-radius:27px;padding:14px 16px;text-align:center}h1{font-size:clamp(2rem,8vw,3.55rem);line-height:.92;letter-spacing:-.06em;margin:0}.tag{margin:7px 0 11px;font-weight:800;opacity:.68}.switches{display:flex;flex-wrap:wrap;justify-content:center;gap:7px}.pill{border:0;border-radius:999px;padding:9px 13px;font-weight:900;color:var(--ink);background:#ffffffa8;box-shadow:inset 0 0 0 1px #17313c1c,0 5px 12px #17313c12;cursor:pointer;transition:.16s}.pill:hover{transform:translateY(-2px)}.pill.active{background:var(--ink);color:#fff}.pill.sound{padding-inline:12px}
.game{border-radius:29px;padding:13px}.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}.player{border-radius:18px;padding:8px 10px;display:flex;gap:8px;align-items:center;background:#ffffff82;opacity:.58;transform:scale(.97);transition:.2s}.player.right{flex-direction:row-reverse;text-align:right}.player.active{opacity:1;transform:scale(1);box-shadow:inset 0 0 0 2px var(--accent),0 7px 20px #0b2e3b16}.avatar{width:50px;height:50px;flex:0 0 50px;filter:drop-shadow(0 5px 5px #0002)}.pname{font-weight:1000;line-height:1}.role{display:block;font-size:.7rem;opacity:.6;margin-top:4px}.score{font-size:.82rem;font-weight:950;margin-top:4px}.vs{font-weight:1000;opacity:.35}.status{text-align:center;font-weight:950;font-size:clamp(1rem,4vw,1.2rem);padding:10px 4px 8px;min-height:44px}.board{width:min(100%,455px);aspect-ratio:1;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;border-radius:25px;background:#17313c24;box-shadow:inset 0 0 0 1px #fff8}.cell{border:0;border-radius:19px;background:#ffffffe0;display:grid;place-items:center;padding:9%;cursor:pointer;box-shadow:0 7px 18px #17313c1c,inset 0 0 0 1px #fff;transition:.15s}.cell:hover:not(:disabled){transform:translateY(-3px);background:#fff}.cell:active:not(:disabled){transform:scale(.95)}.cell:disabled{cursor:default}.cell svg{width:93%;height:93%;filter:drop-shadow(0 6px 5px #0003);animation:pop .32s cubic-bezier(.2,1.6,.4,1)}@keyframes pop{from{opacity:0;transform:scale(.1) rotate(-18deg)}}.cell.win{background:#fff6bd;box-shadow:0 0 0 3px #ffd342,0 0 30px #ffd342b8;animation:pulse .55s ease-in-out infinite alternate}@keyframes pulse{to{transform:translateY(-4px) rotate(1deg)}}.actions{display:flex;justify-content:center;gap:8px;margin-top:11px}.primary{background:var(--ink);color:#fff}.footer{text-align:center;font-size:.72rem;font-weight:800;opacity:.63;text-shadow:0 1px #fff9}
.overlay{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:16px;background:#071d27a8;backdrop-filter:blur(8px)}.overlay.show{display:grid;animation:fade .2s}@keyframes fade{from{opacity:0}}.modal{width:min(94vw,560px);border-radius:32px;background:#fffffff2;box-shadow:0 28px 90px #0006;padding:23px;text-align:center;overflow:hidden}.modal h2{font-size:clamp(2rem,9vw,3.4rem);letter-spacing:-.05em;line-height:1;margin:0}.modal p{font-weight:800;opacity:.66}.stage{height:315px;border-radius:24px;position:relative;overflow:hidden;margin:13px 0;background:linear-gradient(#20376c 0 52%,#15131f 52%)}.stage.party:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 8%,#ffed77 0 3%,transparent 24%),radial-gradient(circle at 82% 9%,#75efff 0 3%,transparent 24%),radial-gradient(circle at 50% 0,#ff74c8 0 3%,transparent 23%);animation:lights .55s infinite alternate}@keyframes lights{to{filter:hue-rotate(100deg);opacity:.66}}.disco{position:absolute;left:50%;top:14px;translate:-50%;width:70px;aspect-ratio:1;border-radius:50%;background:conic-gradient(#ff4d75,#ffd747,#62e8ff,#a969ff,#ff4d75);box-shadow:0 0 35px #fff;animation:spin 1.5s linear infinite}@keyframes spin{to{rotate:360deg}}.hero{position:absolute;width:172px;height:172px;left:50%;top:55%;translate:-50% -50%;filter:drop-shadow(0 16px 9px #0007)}.dance{animation:dance .45s ease-in-out infinite alternate}@keyframes dance{from{transform:rotate(-15deg) translateY(7px)}to{transform:rotate(15deg) translateY(-11px) scale(1.06)}}.note{position:absolute;color:white;font-size:34px;animation:note 1.3s ease-out infinite}.n1{left:12%;top:67%}.n2{right:13%;top:49%;animation-delay:-.55s}@keyframes note{from{transform:translateY(25px);opacity:0}35%{opacity:1}to{transform:translateY(-100px) rotate(18deg);opacity:0}}.rocketstage{background:linear-gradient(#10224f,#426c9e 58%,#c8dbe4 59%,#71675d)}.rocket{animation:launch 2.4s cubic-bezier(.08,.7,.18,1) infinite}@keyframes launch{0%{left:4%;top:75%;transform:rotate(-16deg) scale(.72)}35%{left:43%;top:42%;transform:rotate(5deg)}100%{left:108%;top:-28%;transform:rotate(20deg) scale(.42)}}.flame{position:absolute;width:34px;height:110px;left:18%;top:74%;border-radius:50%;background:linear-gradient(#fff77a,#ff9e32,#f0443b,transparent);transform:rotate(32deg);filter:blur(1px);animation:flame .12s infinite alternate}@keyframes flame{to{height:145px;width:43px;filter:blur(3px)}}canvas{position:fixed;inset:0;z-index:30;pointer-events:none;display:none}canvas.show{display:block}
@media(max-width:520px){.app{align-content:start}.game{padding:10px}.avatar{width:42px;height:42px;flex-basis:42px}.player{padding:7px}.role{display:none}.board{gap:6px;padding:6px;border-radius:21px}.cell{border-radius:15px}.stage{height:280px}.modal{padding:18px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body data-theme="duene">
<div class="world" aria-hidden="true"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="bird b1"></div><div class="bird b2"></div><div class="ridge r1"></div><div class="sea"></div><div class="ridge r2"></div><div class="grass"></div><div class="reeds"></div></div>
<main class="app">
<header class="glass"><h1>TicTacTwo</h1><p class="tag">Seehund gegen Möwe – das Küstenduell</p><div class="switches" aria-label="Spieloptionen"><button class="pill active theme" data-theme="duene">Düne</button><button class="pill theme" data-theme="gras">Gras</button><button class="pill theme" data-theme="watt">Wattenmeer</button><button class="pill active mode" data-mode="ai">Gegen KI</button><button class="pill mode" data-mode="two">2 Spieler</button><button class="pill sound" id="sound" aria-label="Ton umschalten">Ton an</button></div></header>
<section class="game glass"><div class="topbar"><div class="player active" id="sealPlayer"><div class="avatar" data-icon="seal"></div><div><span class="pname">Seehund</span><span class="role">Du</span><div class="score">Siege: <span id="sealScore">0</span></div></div></div><div class="vs">VS</div><div class="player right" id="gullPlayer"><div class="avatar" data-icon="gull"></div><div><span class="pname">Möwe</span><span class="role" id="gullRole">KI</span><div class="score">Siege: <span id="gullScore">0</span></div></div></div></div><div class="status" id="status">Seehund beginnt</div><div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe-Spielfeld"></div><div class="actions"><button class="pill primary" id="restart">Neue Runde</button><button class="pill" id="resetScore">Spielstand löschen</button></div></section><div class="footer">Single-File-Spiel · funktioniert offline und auf GitHub Pages</div>
</main>
<div class="overlay" id="overlay"><div class="modal"><h2 id="winTitle">Gewonnen!</h2><p id="winText"></p><div class="stage" id="stage"></div><button class="pill primary" id="again">Noch eine Runde</button></div></div><canvas id="confetti"></canvas>
<script>
const sealSVG=`<svg viewBox="0 0 120 120" aria-hidden="true"><defs><radialGradient id="sg" cx="38%" cy="28%"><stop stop-color="#f5f2ea"/><stop offset=".55" stop-color="#aeb8b9"/><stop offset="1" stop-color="#657477"/></radialGradient></defs><ellipse cx="60" cy="64" rx="45" ry="43" fill="url(#sg)"/><ellipse cx="42" cy="55" rx="6" ry="7" fill="#1d2a30"/><ellipse cx="78" cy="55" rx="6" ry="7" fill="#1d2a30"/><circle cx="40" cy="52" r="2" fill="#fff"/><circle cx="76" cy="52" r="2" fill="#fff"/><ellipse cx="60" cy="70" rx="10" ry="8" fill="#27363b"/><path d="M60 78c-7 8-15 9-22 6M60 78c7 8 15 9 22 6" fill="none" stroke="#33464c" stroke-width="3" stroke-linecap="round"/><g stroke="#33464c" stroke-width="2" opacity=".8"><path d="M46 73 18 66M46 78 14 80M74 73l28-7M74 78l32 2"/></g><path d="M30 37c8-16 19-22 30-22s22 6 30 22" fill="none" stroke="#778589" stroke-width="8" stroke-linecap="round"/></svg>`;
const gullSVG=`<svg viewBox="0 0 120 120" aria-hidden="true"><defs><radialGradient id="gg" cx="38%" cy="25%"><stop stop-color="#fff"/><stop offset=".7" stop-color="#e6edf0"/><stop offset="1" stop-color="#a9bac2"/></radialGradient></defs><ellipse cx="59" cy="61" rx="43" ry="41" fill="url(#gg)"/><path d="M23 44c10-22 54-29 72 1-22-8-49-9-72-1" fill="#eef3f4"/><path d="M77 64 111 72 78 80Z" fill="#f4aa35"/><ellipse cx="47" cy="55" rx="6" ry="7" fill="#1f2c31"/><ellipse cx="73" cy="55" rx="6" ry="7" fill="#1f2c31"/><circle cx="45" cy="52" r="2" fill="#fff"/><circle cx="71" cy="52" r="2" fill="#fff"/><path d="M34 86c15 11 36 12 51 1" fill="none" stroke="#879ba4" stroke-width="4" stroke-linecap="round"/></svg>`;
document.querySelectorAll('[data-icon="seal"]').forEach(e=>e.innerHTML=sealSVG);document.querySelectorAll('[data-icon="gull"]').forEach(e=>e.innerHTML=gullSVG);
const boardEl=document.getElementById('board'),statusEl=document.getElementById('status'),overlay=document.getElementById('overlay'),stage=document.getElementById('stage'),canvas=document.getElementById('confetti');
let board=Array(9).fill(''),turn='S',over=false,mode='ai',soundOn=true,ctxAudio;
let scores=JSON.parse(localStorage.getItem('tictactwoScores')||'{"S":0,"G":0}');
const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function renderBoard(){boardEl.innerHTML='';board.forEach((v,i)=>{const b=document.createElement('button');b.className='cell';b.setAttribute('role','gridcell');b.setAttribute('aria-label',`Feld ${i+1}`);b.disabled=!!v||over||(mode==='ai'&&turn==='G');if(v)b.innerHTML=v==='S'?sealSVG:gullSVG;b.onclick=()=>move(i);boardEl.appendChild(b)})}
function updatePlayers(){document.getElementById('sealPlayer').classList.toggle('active',turn==='S'&&!over);document.getElementById('gullPlayer').classList.toggle('active',turn==='G'&&!over)}
function setScores(){document.getElementById('sealScore').textContent=scores.S;document.getElementById('gullScore').textContent=scores.G;localStorage.setItem('tictactwoScores',JSON.stringify(scores))}
function result(b=board){for(const line of wins){const[a,c,d]=line;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],line}}return b.every(Boolean)?{winner:'D',line:[]}:null}
function move(i){if(board[i]||over)return;board[i]=turn;beep(turn==='S'?420:610,.08);const r=result();renderBoard();if(r)return finish(r);turn=turn==='S'?'G':'S';statusEl.textContent=turn==='S'?'Seehund ist am Zug':mode==='ai'?'Möwe denkt nach …':'Möwe ist am Zug';updatePlayers();renderBoard();if(mode==='ai'&&turn==='G')setTimeout(aiMove,430)}
function aiMove(){if(over)return;let best=-Infinity,idx=-1;board.forEach((v,i)=>{if(!v){board[i]='G';const score=minimax(board,0,false);board[i]='';if(score>best){best=score;idx=i}}});move(idx)}
function minimax(b,depth,maximizing){const r=result(b);if(r)return r.winner==='G'?10-depth:r.winner==='S'?depth-10:0;if(maximizing){let best=-Infinity;b.forEach((v,i)=>{if(!v){b[i]='G';best=Math.max(best,minimax(b,depth+1,false));b[i]=''}});return best}else{let best=Infinity;b.forEach((v,i)=>{if(!v){b[i]='S';best=Math.min(best,minimax(b,depth+1,true));b[i]=''}});return best}}
function finish(r){over=true;updatePlayers();if(r.winner==='D'){statusEl.textContent='Unentschieden – starkes Küstenduell';setTimeout(()=>showCelebration('D'),300);return}statusEl.textContent=(r.winner==='S'?'Seehund':'Möwe')+' gewinnt!';r.line.forEach(i=>boardEl.children[i].classList.add('win'));scores[r.winner]++;setScores();victoryTune(r.winner);setTimeout(()=>showCelebration(r.winner),500)}
function showCelebration(w){document.getElementById('winTitle').textContent=w==='D'?'Unentschieden!':w==='S'?'Seehund-Sieg!':'Möwen-Sieg!';document.getElementById('winText').textContent=w==='D'?'Noch einmal – diesmal fällt die Entscheidung.':w==='S'?'Die Robbe übernimmt die Tanzfläche.':'Raketenantrieb gezündet – die Möwe hebt ab.';if(w==='S')stage.className='stage party',stage.innerHTML='<div class="disco"></div><div class="hero dance">'+sealSVG+'</div><div class="note n1">♪</div><div class="note n2">♫</div>';else if(w==='G')stage.className='stage rocketstage',stage.innerHTML='<div class="flame"></div><div class="hero rocket">'+gullSVG+'</div>';else stage.className='stage party',stage.innerHTML='<div class="disco"></div><div class="hero dance" style="left:36%">'+sealSVG+'</div><div class="hero dance" style="left:65%;animation-delay:-.2s">'+gullSVG+'</div>';overlay.classList.add('show');confetti(1800)}
function reset(){board=Array(9).fill('');turn='S';over=false;statusEl.textContent='Seehund beginnt';overlay.classList.remove('show');canvas.classList.remove('show');renderBoard();updatePlayers()}
document.getElementById('restart').onclick=reset;document.getElementById('again').onclick=reset;document.getElementById('resetScore').onclick=()=>{scores={S:0,G:0};setScores();reset()};
document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>{document.body.dataset.theme=b.dataset.theme;document.querySelectorAll('.theme').forEach(x=>x.classList.toggle('active',x===b));beep(520,.05)});
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));document.getElementById('gullRole').textContent=mode==='ai'?'KI':'Spieler 2';document.querySelector('#sealPlayer .role').textContent=mode==='ai'?'Du':'Spieler 1';reset()});
document.getElementById('sound').onclick=e=>{soundOn=!soundOn;e.target.textContent=soundOn?'Ton an':'Ton aus';if(soundOn)beep(660,.07)};
function audio(){return ctxAudio||(ctxAudio=new(window.AudioContext||window.webkitAudioContext)())}function beep(freq,d=.08,type='sine'){if(!soundOn)return;const c=audio(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}function victoryTune(w){if(!soundOn)return;const notes=w==='S'?[392,523,659,784]:[523,659,784,1046];notes.forEach((n,i)=>setTimeout(()=>beep(n,.18,'triangle'),i*120))}
function confetti(ms){const c=canvas,x=c.getContext('2d'),dpr=Math.min(devicePixelRatio||1,2);c.width=innerWidth*dpr;c.height=innerHeight*dpr;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';x.scale(dpr,dpr);canvas.classList.add('show');const bits=Array.from({length:120},()=>({x:Math.random()*innerWidth,y:-20-Math.random()*innerHeight*.35,vx:(Math.random()-.5)*4,vy:2+Math.random()*5,r:3+Math.random()*5,a:Math.random()*6.28,va:(Math.random()-.5)*.25,h:Math.random()*360}));const start=performance.now();function frame(t){x.clearRect(0,0,innerWidth,innerHeight);bits.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;x.save();x.translate(p.x,p.y);x.rotate(p.a);x.fillStyle=`hsl(${p.h} 85% 58%)`;x.fillRect(-p.r,-p.r/2,p.r*2,p.r);x.restore()});if(t-start<ms)requestAnimationFrame(frame);else canvas.classList.remove('show')}requestAnimationFrame(frame)}
setScores();renderBoard();updatePlayers();
</script>
</body>
</html>
