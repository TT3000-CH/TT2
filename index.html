<body data-theme="duene">
<div class="world" aria-hidden="true"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="bird b1"></div><div class="bird b2"></div><div class="ridge r1"></div><div class="sea"></div><div class="ridge r2"></div><div class="grass"></div><div class="reeds"></div></div>
<main class="app">
<header class="glass"><h1>TicTacTwo</h1><p class="tag">Seehund gegen Möwe</p><div class="switches" aria-label="Spieloptionen"><button class="pill active theme" data-theme="duene">Düne</button><button class="pill theme" data-theme="gras">Gras</button><button class="pill theme" data-theme="watt">Watt</button><button class="pill active mode" data-mode="ai">KI</button><button class="pill mode" data-mode="two">2 Spieler</button><label class="switch" for="sound"><span>Ton</span><input id="sound" type="checkbox" checked aria-label="Küstenklang ein- oder ausschalten"><span class="track" aria-hidden="true"></span></label><label class="switch" for="chaos"><span>Chaos</span><input id="chaos" type="checkbox" checked aria-label="Sylt-Chaos ein- oder ausschalten"><span class="track" aria-hidden="true"></span></label></div></header>
<section class="game glass"><div class="topbar"><div class="player active" id="sealPlayer"><div class="avatar" data-icon="seal"></div><div><span class="pname">Seehund</span><span class="role">Du</span><div class="score">Siege: <span id="sealScore">0</span></div></div></div><div class="vs">VS</div><div class="player right" id="gullPlayer"><div class="avatar" data-icon="gull"></div><div><span class="pname">Möwe</span><span class="role" id="gullRole">KI</span><div class="score">Siege: <span id="gullScore">0</span></div></div></div></div><div class="status" id="status">Seehund beginnt</div><div class="chaos-banner" id="chaosBanner" aria-live="assertive"><span class="event-icon" id="eventIcon">🌊</span><span><span id="eventTitle">Sylt-Chaos</span><small id="eventText">Etwas Unerwartetes passiert.</small></span></div><div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe-Spielfeld"></div><div class="actions"><button class="pill primary" id="restart">Neue Runde</button><button class="pill" id="resetScore">Spielstand löschen</button></div></section><div class="footer">Sylt-Chaos · Single-File · offline und GitHub-Pages-tauglich</div>
</main>
<div class="overlay" id="overlay"><div class="modal"><h2 id="winTitle">Gewonnen!</h2><p id="winText"></p><div class="stage" id="stage"></div><button class="pill primary" id="again">Noch eine Runde</button></div></div><canvas id="confetti"></canvas>
<script>
const sealSVG=`<svg viewBox="0 0 120 120" aria-hidden="true"><defs><radialGradient id="sg" cx="38%" cy="28%"><stop stop-color="#f5f2ea"/><stop offset=".55" stop-color="#aeb8b9"/><stop offset="1" stop-color="#657477"/></radialGradient></defs><ellipse cx="60" cy="64" rx="45" ry="43" fill="url(#sg)"/><ellipse cx="42" cy="55" rx="6" ry="7" fill="#1d2a30"/><ellipse cx="78" cy="55" rx="6" ry="7" fill="#1d2a30"/><circle cx="40" cy="52" r="2" fill="#fff"/><circle cx="76" cy="52" r="2" fill="#fff"/><ellipse cx="60" cy="70" rx="10" ry="8" fill="#27363b"/><path d="M60 78c-7 8-15 9-22 6M60 78c7 8 15 9 22 6" fill="none" stroke="#33464c" stroke-width="3" stroke-linecap="round"/><g stroke="#33464c" stroke-width="2" opacity=".8"><path d="M46 73 18 66M46 78 14 80M74 73l28-7M74 78l32 2"/></g><path d="M30 37c8-16 19-22 30-22s22 6 30 22" fill="none" stroke="#778589" stroke-width="8" stroke-linecap="round"/></svg>`;

document.querySelectorAll('[data-icon="seal"]').forEach(e=>e.innerHTML=sealSVG);document.querySelectorAll('[data-icon="gull"]').forEach(e=>e.innerHTML=gullSVG);
const boardEl=document.getElementById('board'),statusEl=document.getElementById('status'),overlay=document.getElementById('overlay'),stage=document.getElementById('stage'),canvas=document.getElementById('confetti'),chaosBanner=document.getElementById('chaosBanner');
let board=Array(9).fill(''),turn='S',over=false,mode='ai',soundOn=true,chaosOn=true,eventBusy=false,moveCount=0,chaosCooldown=2,lastMove=-1,blocked={},ctxAudio;

function tickBlocks(){Object.keys(blocked).forEach(k=>{blocked[k].turns--;if(blocked[k].turns<=0)delete blocked[k]})}

function setScores(){document.getElementById('sealScore').textContent=scores.S;document.getElementById('gullScore').textContent=scores.G;localStorage.setItem('tictactwoScores',JSON.stringify(scores))}
function result(b=board){for(const line of wins){const[a,c,d]=line;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],line}}return b.every((v,i)=>v||blocked[i])?{winner:'D',line:[]}:null}
function move(i){if(board[i]||blocked[i]||over||eventBusy)return;board[i]=turn;lastMove=i;moveCount++;tickBlocks();beep(turn==='S'?420:610,.08);const r=result();renderBoard();if(r)return finish(r);turn=turn==='S'?'G':'S';updateTurnText();updatePlayers();renderBoard();maybeChaos(()=>{if(mode==='ai'&&turn==='G'&&!over)setTimeout(aiMove,430)})}
function updateTurnText(){statusEl.textContent=eventBusy?'Sylt-Chaos …':turn==='S'?'Seehund ist am Zug':mode==='ai'?'Möwe denkt nach …':'Möwe ist am Zug'}
function aiMove(){if(over||eventBusy)return;const free=board.map((v,i)=>(!v&&!blocked[i])?i:null).filter(v=>v!==null);if(!free.length){const r=result();if(r)finish(r);return}let idx=-1;if(Math.random()<.7){let best=-Infinity;free.forEach(i=>{board[i]='G';const score=minimax(board,0,false);board[i]='';if(score>best){best=score;idx=i}})}else{const tactical=free.filter(i=>{board[i]='G';const win=result()?.winner==='G';board[i]='';return win});const blocks=free.filter(i=>{board[i]='S';const block=result()?.winner==='S';board[i]='';return block});const pool=tactical.length&&Math.random()<.78?tactical:blocks.length&&Math.random()<.5?blocks:free;idx=pool[Math.floor(Math.random()*pool.length)]}move(idx)}
function showChaos(icon,title,text,affected=[]){eventBusy=true;updateTurnText();updatePlayers();renderBoard();document.getElementById('eventIcon').textContent=icon;document.getElementById('eventTitle').textContent=title;document.getElementById('eventText').textContent=text;chaosBanner.classList.add('show');document.body.classList.add('chaos-flash');beep(180,.18,'sawtooth');setTimeout(()=>affected.forEach(i=>boardEl.children[i]?.classList.add('event-hit')),80);return new Promise(resolve=>setTimeout(()=>{chaosBanner.classList.remove('show');document.body.classList.remove('chaos-flash');eventBusy=false;updateTurnText();updatePlayers();renderBoard();resolve()},1450))}
async function maybeChaos(done){if(!chaosOn||moveCount<3||chaosCooldown>0||Math.random()>.42){chaosCooldown=Math.max(0,chaosCooldown-1);done();return}chaosCooldown=2+Math.floor(Math.random()*2);const options=[];const empty=board.map((v,i)=>(!v&&!blocked[i])?i:null).filter(v=>v!==null);const occupied=board.map((v,i)=>v?i:null).filter(v=>v!==null);if(empty.length)options.push('tourist','seal');if(occupied.length>1)options.push('gull');if(board.slice(6).some(Boolean))options.push('flood');if(occupied.length>2)options.push('wind');if(!options.length){done();return}const event=options[Math.floor(Math.random()*options.length)];if(event==='tourist'){const i=empty[Math.floor(Math.random()*empty.length)];blocked[i]={turns:2,label:'Strandkorb',icon:'🏖️'};await showChaos('🏖️','Tourist im Weg','Ein Strandkorb blockiert dieses Feld für zwei Züge.',[i])}else if(event==='seal'){const i=empty[Math.floor(Math.random()*empty.length)];blocked[i]={turns:2,label:'Robbenpause',icon:'🦭'};await showChaos('🦭','Robbenpause','Eine Robbe macht es sich zwei Züge lang bequem.',[i]);sealCall()}else if(event==='gull'){const pool=occupied.filter(i=>i!==lastMove);const i=(pool.length?pool:occupied)[Math.floor(Math.random()*(pool.length||occupied.length))];board[i]='';await showChaos('🐟','Möwen-Diebstahl','Die Möwe klaut einen Spielstein vom Feld.',[i]);gullCall()}else if(event==='flood'){const hit=[6,7,8].filter(i=>board[i]);hit.forEach(i=>board[i]='');await showChaos('🌊','Sturmflut!','Die unterste Reihe wird freigespült.',hit)}else{const pool=[...occupied].sort(()=>Math.random()-.5).slice(0,2);[board[pool[0]],board[pool[1]]]=[board[pool[1]],board[pool[0]]];await showChaos('💨','Nordseeböe','Zwei Spielsteine tauschen ihre Plätze.',pool)}const r=result();if(r)finish(r);else done()}
function minimax(b,depth,maximizing){const r=result(b);if(r)return r.winner==='G'?10-depth:r.winner==='S'?depth-10:0;if(maximizing){let best=-Infinity;b.forEach((v,i)=>{if(!v&&!blocked[i]){b[i]='G';best=Math.max(best,minimax(b,depth+1,false));b[i]=''}});return best===-Infinity?0:best}else{let best=Infinity;b.forEach((v,i)=>{if(!v&&!blocked[i]){b[i]='S';best=Math.min(best,minimax(b,depth+1,true));b[i]=''}});return best===Infinity?0:best}}
function finish(r){over=true;updatePlayers();if(r.winner==='D'){statusEl.textContent='Unentschieden – starkes Küstenduell';setTimeout(()=>showCelebration('D'),300);return}statusEl.textContent=(r.winner==='S'?'Seehund':'Möwe')+' gewinnt!';r.line.forEach(i=>boardEl.children[i].classList.add('win'));scores[r.winner]++;setScores();victoryTune(r.winner);setTimeout(()=>showCelebration(r.winner),500)}
function showCelebration(w){document.getElementById('winTitle').textContent=w==='D'?'Unentschieden!':w==='S'?'Seehund-Sieg!':'Möwen-Sieg!';document.getElementById('winText').textContent=w==='D'?'Noch einmal – diesmal fällt die Entscheidung.':w==='S'?'Die Robbe übernimmt die Tanzfläche.':'Raketenantrieb gezündet – die Möwe hebt ab.';if(w==='S')stage.className='stage party',stage.innerHTML='<div class="disco"></div><div class="hero dance">'+sealSVG+'</div><div class="note n1">♪</div><div class="note n2">♫</div>';else if(w==='G')stage.className='stage rocketstage',stage.innerHTML='<div class="rocket-wrap"><div class="smoke"></div><div class="flame"></div><div class="rocket-body"><div class="window"></div></div><div class="fin"></div><div class="rider">'+gullSVG+'</div></div>';else stage.className='stage party',stage.innerHTML='<div class="disco"></div><div class="hero dance" style="left:36%">'+sealSVG+'</div><div class="hero dance" style="left:65%;animation-delay:-.2s">'+gullSVG+'</div>';overlay.classList.add('show');confetti(1800)}
function reset(){board=Array(9).fill('');turn='S';over=false;eventBusy=false;moveCount=0;chaosCooldown=2;lastMove=-1;blocked={};statusEl.textContent='Seehund beginnt';overlay.classList.remove('show');chaosBanner.classList.remove('show');canvas.classList.remove('show');renderBoard();updatePlayers()}
document.getElementById('restart').onclick=reset;document.getElementById('again').onclick=reset;document.getElementById('resetScore').onclick=()=>{scores={S:0,G:0};setScores();reset()};
document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>{document.body.dataset.theme=b.dataset.theme;document.querySelectorAll('.theme').forEach(x=>x.classList.toggle('active',x===b));beep(520,.05)});
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));document.getElementById('gullRole').textContent=mode==='ai'?'KI':'Spieler 2';document.querySelector('#sealPlayer .role').textContent=mode==='ai'?'Du':'Spieler 1';reset()});
let ambientNodes=[],animalTimer;
function audio(){return ctxAudio||(ctxAudio=new(window.AudioContext||window.webkitAudioContext)())}
function beep(freq,d=.08,type='sine'){if(!soundOn)return;const c=audio(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.065,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}
function noiseBuffer(seconds=3){const c=audio(),b=c.createBuffer(1,c.sampleRate*seconds,c.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++){const t=i/a.length;a[i]=(Math.random()*2-1)*(.42+.58*Math.sin(Math.PI*t))}return b}
function startAmbient(){if(!soundOn||ambientNodes.length)return;const c=audio();if(c.state==='suspended')c.resume();const master=c.createGain();master.gain.value=.18;master.connect(c.destination);const sea=c.createBufferSource(),seaFilter=c.createBiquadFilter(),seaGain=c.createGain();sea.buffer=noiseBuffer(5);sea.loop=true;seaFilter.type='lowpass';seaFilter.frequency.value=780;seaGain.gain.value=.16;sea.connect(seaFilter).connect(seaGain).connect(master);sea.start();const breeze=c.createBufferSource(),breezeFilter=c.createBiquadFilter(),breezeGain=c.createGain();breeze.buffer=noiseBuffer(4);breeze.loop=true;breezeFilter.type='bandpass';breezeFilter.frequency.value=1250;breezeFilter.Q.value=.45;breezeGain.gain.value=.045;breeze.connect(breezeFilter).connect(breezeGain).connect(master);breeze.start();const lfo=c.createOscillator(),lfoGain=c.createGain();lfo.frequency.value=.11;lfoGain.gain.value=.055;lfo.connect(lfoGain).connect(seaGain.gain);lfo.start();ambientNodes=[sea,breeze,lfo,master];scheduleAnimal()}
function stopAmbient(){clearTimeout(animalTimer);ambientNodes.forEach(n=>{try{n.stop&&n.stop()}catch(e){}try{n.disconnect&&n.disconnect()}catch(e){}});ambientNodes=[]}
function gullCall(){if(!soundOn)return;const c=audio(),g=c.createGain();g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.055,c.currentTime+.04);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.55);g.connect(c.destination);[0,.18].forEach((delay,j)=>{const o=c.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(920-j*110,c.currentTime+delay);o.frequency.exponentialRampToValueAtTime(520-j*70,c.currentTime+delay+.24);o.connect(g);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+.34)})}
function sealCall(){if(!soundOn)return;const c=audio(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();o.type='sawtooth';o.frequency.setValueAtTime(165,c.currentTime);o.frequency.exponentialRampToValueAtTime(92,c.currentTime+.8);f.type='lowpass';f.frequency.value=520;g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.07,c.currentTime+.08);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.9);o.connect(f).connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.95)}
function scheduleAnimal(){clearTimeout(animalTimer);animalTimer=setTimeout(()=>{Math.random()<.62?gullCall():sealCall();scheduleAnimal()},4200+Math.random()*6200)}
document.getElementById('sound').onchange=e=>{soundOn=e.target.checked;if(soundOn){startAmbient();beep(660,.07)}else stopAmbient()};
document.getElementById('chaos').onchange=e=>{chaosOn=e.target.checked;beep(chaosOn?760:260,.07);if(!chaosOn){blocked={};chaosBanner.classList.remove('show');renderBoard()}statusEl.textContent=chaosOn?'Sylt-Chaos aktiviert':(turn==='S'?'Seehund ist am Zug':mode==='ai'?'Möwe denkt nach …':'Möwe ist am Zug');setTimeout(updateTurnText,850)};
['pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,()=>{if(soundOn)startAmbient()},{once:true}));
function victoryTune(w){if(!soundOn)return;const notes=w==='S'?[392,523,659,784]:[523,659,784,1046];notes.forEach((n,i)=>setTimeout(()=>beep(n,.18,'triangle'),i*120));setTimeout(()=>w==='S'?sealCall():gullCall(),180)}
function confetti(ms){const c=canvas,x=c.getContext('2d'),dpr=Math.min(devicePixelRatio||1,2);c.width=innerWidth*dpr;c.height=innerHeight*dpr;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';x.scale(dpr,dpr);canvas.classList.add('show');const bits=Array.from({length:120},()=>({x:Math.random()*innerWidth,y:-20-Math.random()*innerHeight*.35,vx:(Math.random()-.5)*4,vy:2+Math.random()*5,r:3+Math.random()*5,a:Math.random()*6.28,va:(Math.random()-.5)*.25,h:Math.random()*360}));const start=performance.now();function frame(t){x.clearRect(0,0,innerWidth,innerHeight);bits.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;x.save();x.translate(p.x,p.y);x.rotate(p.a);x.fillStyle=`hsl(${p.h} 85% 58%)`;x.fillRect(-p.r,-p.r/2,p.r*2,p.r);x.restore()});if(t-start<ms)requestAnimationFrame(frame);else canvas.classList.remove('show')}requestAnimationFrame(frame)}
document.querySelector('.game').animate([{opacity:0,transform:'translateY(10px)'},{opacity:1,transform:'translateY(0)'}],{duration:420,easing:'ease-out'});setScores();renderBoard();updatePlayers();
</script>
